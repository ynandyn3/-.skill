<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>小毛驴儿 AI 工作台</title>
  <style>
    :root {
      --ink: #243227;
      --muted: #66736a;
      --leaf: #2fa36b;
      --tomato: #ff6b57;
      --cream: #fff7d7;
      --sky: #d8f3ff;
      --paper: #fffef8;
      --line: #dbe8cf;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--ink);
      font-family: "Songti SC", "Noto Serif SC", "STSong", serif;
      background:
        linear-gradient(90deg, rgba(255, 211, 90, 0.16) 0 1px, transparent 1px 28px),
        linear-gradient(180deg, rgba(47, 163, 107, 0.12) 0 1px, transparent 1px 28px),
        linear-gradient(180deg, #fff4c9 0%, #eaf9f2 48%, #fff8df 100%);
      letter-spacing: 0;
    }

    main {
      width: min(100%, 760px);
      margin: 0 auto;
      padding: 24px 16px 44px;
    }

    .hero, .card {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(255, 254, 248, 0.94);
      box-shadow: 0 18px 50px rgba(37, 83, 61, 0.12);
    }

    .hero {
      padding: 24px 18px;
      background: linear-gradient(135deg, rgba(255, 254, 248, 0.96) 0%, rgba(228, 248, 223, 0.92) 100%);
    }

    .kicker {
      margin: 0 0 8px;
      color: #19744d;
      font-size: 13px;
      font-weight: 700;
    }

    h1 {
      margin: 0;
      font-size: clamp(30px, 9vw, 48px);
      line-height: 1.08;
    }

    .sub {
      margin: 12px 0 0;
      color: var(--muted);
      font-size: 15px;
      line-height: 1.7;
    }

    .grid {
      display: grid;
      gap: 12px;
      margin-top: 14px;
    }

    .card {
      display: block;
      padding: 16px;
      color: inherit;
      text-decoration: none;
      transition: transform 160ms ease, border-color 160ms ease;
    }

    .card:active {
      transform: scale(0.99);
    }

    .card strong {
      display: block;
      color: var(--tomato);
      font-size: 20px;
      margin-bottom: 8px;
    }

    .card span {
      display: block;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.65;
    }

    .tag-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 14px;
    }

    .tag {
      border-radius: 999px;
      padding: 6px 9px;
      background: var(--sky);
      color: #246578;
      border: 1px solid rgba(47, 163, 107, 0.16);
      font-size: 12px;
    }
  </style>
</head>
<body>
  <main>
    <section class="hero">
      <p class="kicker">AI 工作台</p>
      <h1>小毛驴儿的实用小工具</h1>
      <p class="sub">这里放我用 AI 做出来、自己真的会用的小网页。先从宝宝每周食谱开始，后面再放 skill、内容案例和工作流。</p>
      <div class="tag-row">
        <span class="tag">手机可打开</span>
        <span class="tag">不用安装</span>
        <span class="tag">持续迭代</span>
      </div>
    </section>

    <section class="grid">
      <a class="card" href="./baby-menu/">
        <strong>宝宝这周吃什么</strong>
        <span>2 岁半宝宝的一周食谱、周日采购清单、每日做法提示。</span>
      </a>
    </section>
  </main>
</body>
</html>
